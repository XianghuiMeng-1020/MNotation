name = "mnotation-api"
main = "workers/api/src/index.ts"
compatibility_date = "2025-01-01"

[triggers]
crons = ["0 4 * * *"]

[vars]
IDLE_THRESHOLD_MS = "10000"
MIN_ACTIVE_MS = "800"
QWEN_MAX_CONCURRENT = "20"
IRR_AUTO_CHECK_INTERVAL = "20"
IRR_LOW_THRESHOLD = "0.3"
ALLOW_HEADER_AUTH = "false"
ALLOWED_ORIGINS = "https://mnotation.pages.dev,http://localhost:5173"
# AUTH_COOKIE_SECRET is set as a Wrangler secret (not stored here)

[durable_objects]
bindings = [
  { name = "STATS_HUB", class_name = "StatsHub" },
  { name = "QWEN_LIMITER", class_name = "QwenRateLimiter" },
  { name = "AL_RUNNER", class_name = "AlRunner" },
  { name = "CHAT_HUB", class_name = "ChatHub" }
]

[[migrations]]
tag = "v1"
new_sqlite_classes = ["StatsHub", "QwenRateLimiter", "AlRunner", "ChatHub"]

[[d1_databases]]
binding = "DB"
database_name = "mnotation_db"
database_id = "6e4dc1ad-084a-4fd6-b477-d8b7973cbdf0"
migrations_dir = "db/migrations"

[[r2_buckets]]
binding = "UPLOADS"
bucket_name = "mnotation-uploads"

[env.staging]
name = "mnotation-api-staging"

[env.staging.durable_objects]
bindings = [
  { name = "STATS_HUB", class_name = "StatsHub" },
  { name = "QWEN_LIMITER", class_name = "QwenRateLimiter" },
  { name = "AL_RUNNER", class_name = "AlRunner" },
  { name = "CHAT_HUB", class_name = "ChatHub" }
]

[env.staging.vars]
IDLE_THRESHOLD_MS = "10000"
MIN_ACTIVE_MS = "800"
QWEN_MAX_CONCURRENT = "20"
IRR_AUTO_CHECK_INTERVAL = "20"
IRR_LOW_THRESHOLD = "0.3"
ALLOW_HEADER_AUTH = "false"
ALLOWED_ORIGINS = "https://mnotation.pages.dev,http://localhost:5173"

[[env.staging.d1_databases]]
binding = "DB"
database_name = "mnotation_db_staging"
database_id = "f3b771ca-657f-420f-a134-5c20cb4bd1c0"
migrations_dir = "db/migrations"

[[env.staging.r2_buckets]]
binding = "UPLOADS"
bucket_name = "mnotation-uploads"
